name: Build Dashboard Feed

on:
  schedule:
    # Every 6 hours — keeps public/jobs.json fresh without hammering boards on page load
    - cron: '0 */6 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22' # JSON import attributes need Node >= 22

      - name: Build precomputed feed
        run: node scripts/build_feed.mjs

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/jobs.json
          if git diff --staged --quiet; then
            echo "No feed changes."
          else
            git commit -m "chore: refresh dashboard feed [skip ci]"
            git push
          fi
